<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f1a" />

  <!-- iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Assignment Hub</title>

  <!-- CSS 분리 -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="app">

  <!-- =========================
       LOADING LAYER
  ========================== -->
  <section id="loading-layer" class="layer active">
    <div class="center">
      <div class="spinner"></div>
      <div class="text">Loading...</div>
    </div>
  </section>

  <!-- =========================
       LOGIN LAYER
  ========================== -->
  <section id="login-layer" class="layer">

    <div class="auth-container">

      <div class="auth-card">

        <div class="title">Sign In</div>

        <input id="login-id" type="text" placeholder="Student ID" />
        <input id="login-pw" type="password" placeholder="Password" />

        <button id="login-btn">Login</button>

        <div class="hint">
          Cyber Campus Assignment System
        </div>

      </div>

    </div>

  </section>

  <!-- =========================
       DASHBOARD LAYER
  ========================== -->
  <section id="dashboard-layer" class="layer">

    <header class="top-bar">
      <div class="app-title">Assignments</div>
      <button id="logout-btn">Logout</button>
    </header>

    <main id="app-view" class="content">

      <!-- app.js가 여기 DOM 생성 -->
      <div class="empty-state">
        Loading data...
      </div>

    </main>

  </section>

  <!-- =========================
       MODAL LAYER
  ========================== -->
  <div id="modal-layer" class="overlay"></div>

  <!-- =========================
       TOAST LAYER
  ========================== -->
  <div id="toast-layer"></div>

</div>

<!-- APP SCRIPT -->
<script src="app.js" defer></script>

</body>
</html>
