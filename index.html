<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f1a" />

  <!-- iOS full screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Assignment Hub</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #0b0f1a;
      color: white;
      height: 100%;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ------------------------
       OVERLAY SYSTEM
    ------------------------ */

    #loading-screen,
    #login-view,
    #app-view,
    #modal-layer,
    #toast-layer {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    /* ------------------------
       LOADING
    ------------------------ */
    #loading-screen {
      background: radial-gradient(circle at center, #1a1f2e, #0b0f1a);
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ------------------------
       LOGIN CARD (iOS style)
    ------------------------ */
    .login-card {
      width: 320px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #4f7cff;
      color: white;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    /* ------------------------
       APP VIEW
    ------------------------ */
    #app-view {
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      align-items: flex-start;
    }

    /* ------------------------
       MODAL / TOAST
    ------------------------ */
    #modal-layer,
    #toast-layer {
      pointer-events: none;
    }

  </style>
</head>

<body>

<div id="app">

  <!-- LOADING -->
  <div id="loading-screen" class="active">
    <div class="loader"></div>
  </div>

  <!-- LOGIN -->
  <div id="login-view">
    <div class="login-card">
      <h2>Login</h2>
      <input id="username" placeholder="ID" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn">Sign In</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app-view"></div>

  <!-- MODAL -->
  <div id="modal-layer"></div>

  <!-- TOAST -->
  <div id="toast-layer"></div>

</div>

<!-- APP SCRIPT -->
<script src="app.js" defer></script>

</body>
</html>
